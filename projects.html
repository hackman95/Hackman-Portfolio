<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Koran Hackman</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-mode">
    <!-- Theme Toggle (Feature 1) Logic Persistence -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.className = savedTheme + '-mode';
    </script>

    <!-- Navigation -->
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">KH<span>.</span></a>
            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="projects.html" class="active">Projects</a>
                <a href="contact.html">Contact</a>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </button>
            </nav>
            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle Menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container py-8">
        <section class="projects-header">
            <h1 class="section-title">Technical Showcase</h1>
            <p class="subtitle">A curation of web engineering projects from the Vets Who Code curriculum.</p>
        </section>

        <!-- Feature 4: Filtering (Clean UI) -->
        <div class="filter-controls" id="filter-buttons">
            <button class="filter-btn active" data-filter="all">All Artifacts</button>
            <button class="filter-btn" data-filter="CSS">CSS Layouts</button>
            <button class="filter-btn" data-filter="JavaScript">Logic Puzzles</button>
        </div>

        <!-- Feature 3: Dynamic Project Container (JS Driven) -->
        <div id="projects-grid" class="projects-grid">
            <!-- Populated by projects.js -->
            <div class="loader">Loading Technical Exhibits...</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 Koran Hackman. All Rights Reserved.</p>
            <div class="social-links">
                <a href="https://github.com/hackman95" target="_blank">GitHub</a>
                <a href="#" target="_blank">LinkedIn</a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/projects.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
