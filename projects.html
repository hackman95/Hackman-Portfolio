<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Koran Hackman</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Theme Persistence Script -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.classList.toggle('dark-mode', savedTheme === 'dark');
    </script>

    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">K. Hackman</a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="projects.html" class="active">Projects</a>
                <a href="contact.html">Contact</a>
                <button id="theme-toggle" aria-label="Toggle Night Mode">
                    <span class="sun-icon">☀️</span>
                    <span class="moon-icon">🌙</span>
                </button>
            </nav>
            <button class="menu-toggle" id="mobile-menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="container py-8">
        <section class="projects-header">
            <h1 class="section-title">Showcase</h1>
            <p class="subtitle italic">Module 4 Practice Layouts & Dynamic Portfolio Development.</p>
        </section>

        <!-- Feature 4: Filtering (Optional but good for interview) -->
        <div class="filter-controls" id="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="CSS">CSS Layouts</button>
            <button class="filter-btn" data-filter="JavaScript">JavaScript</button>
        </div>

        <!-- Feature 3: Dynamic Project Container -->
        <div id="projects-grid" class="projects-grid">
            <!-- Populated by projects.js -->
            <div class="loader">Loading Academic Artifacts...</div>
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 Koran Hackman. Veterans Who Code.</p>
        </div>
    </footer>

    <!-- Feature 3 & 4 JS -->
    <script src="js/projects.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
